<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona Finder</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background: #FBFBFD;">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ─── Nemotron-Personas-Korea 핵심 통계 (데이터셋 카드 기반) ───
    const STATS_CONTEXT = `
[Nemotron-Personas-Korea 데이터셋 통계 요약]
- 개요: NVIDIA가 통계청(KOSIS)·대법원·국민건강보험공단·농촌경제연구원 실측 분포로 합성한 100만 레코드(700만 페르소나), 성인(19세+), 17개 시도·252개 시군구.
- 연령: 항아리형 구조. 50-64세가 최대 코호트(구간별 약 9%). 저출산으로 20대 이하로 갈수록 얇아짐. 80-89세는 여성이 남성의 약 1.52배.
- 혼인: 19-24세 미혼 95%+. 30대에 미혼 55%→31%로 감소(평균 초혼 31-33세). 유배우 비율은 50대 후반 78%로 정점. 이혼율은 50대~60대 초반 약 12%로 최고(황혼이혼). 사별은 80대 후반 66%.
- 가구: '부부+미혼자녀'가 최다(19세 기준 63.6%, 40대 중반까지 과반). 1인가구는 20대 초반(15-22%)과 75세 이상(21-32%)의 이중 봉우리. 부부 가구는 65-69세 45.7% 정점. 한부모는 모+자녀(5-14%)가 부+자녀(2-5%)보다 많음.
- 학력: 20-34세는 4년제 대졸 50%+, 전문대 포함 시 약 75%. 35-54세는 고졸이 최다(31-50%). 80세+는 무학(36%)+초졸(37%)=73%.
- 지역별 학사 이상 비율: 전국 32.9%, 세종 49.0%(1위), 서울 45.1%, 대전 39.7%, 광주 36.2%, 경기 34.8%.
- 직업: 전문가·사무직이 최대 비중(지식·서비스 경제). 판매직 1위는 온라인 쇼핑 판매원(판매직의 19.8%). 단순노무는 건물 경비원(21.3%)·청소원(16.0%) 집중. 서비스직은 한식 조리사·시설 경비원, 장치조작은 지게차·화물차 운전원 중심. 군인은 전체의 약 1%.
- 성씨: 김 21.5%, 이 14.7%, 박 8.5%, 정 4.8%, 최 4.7% (상위 5개=54%).
    `;

    const FIELDS = [
      { k: "name", label: "이름" },
      { k: "sex", label: "성별" },
      { k: "age", label: "나이" },
      { k: "region", label: "지역" },
      { k: "occupation", label: "직업" },
      { k: "education", label: "학력" },
      { k: "marital", label: "혼인상태" },
      { k: "household", label: "가구형태" },
      { k: "persona", label: "페르소나 요약" },
      { k: "reason", label: "통계 기반 추천 이유" },
      { k: "coverage", label: "대표성" },
    ];

    const SAMPLE_TOPICS = [
      "저가 커피 프랜차이즈 신메뉴",
      "전기차 구매 의향 조사",
      "OTT 구독 서비스",
      "실버 헬스케어 앱",
      "지방 소도시 관광 활성화",
    ];

    async function fetchBatch(topic, startIdx, count, existing, apiKey) {
      const existingNote = existing.length
        ? `이미 추천된 페르소나(중복 금지): ${existing
            .map((p) => `${p.age}세 ${p.sex} ${p.occupation}(${p.region})`)
            .join(", ")}`
        : "";
      
      const prompt = `당신은 NVIDIA Nemotron-Personas-Korea 데이터셋(대한민국 실제 인구 분포 기반 합성 페르소나 100만 건) 전문가입니다.
${STATS_CONTEXT}

주제: "${topic}"

이 주제에 적합한 한국인 페르소나 ${count}명(전체 10명 중 ${startIdx + 1}~${startIdx + count}번째)을 추천하세요.
${existingNote}

규칙:
1. 연령·성별·지역·직업·학력 분포가 위 통계와 일치하도록 현실적으로 배정 (주제 타깃층에 맞추되, 데이터셋 분포상 대표성 있는 세그먼트 위주로).
2. reason(w)에는 반드시 위 통계 수치를 인용해 "이 세그먼트가 한국 인구에서 얼마나 대표적인지"를 근거로 제시. 예: "50-64세는 데이터셋 최대 코호트(구간별 약 9%)로...".
3. coverage(c)는 해당 세그먼트의 대략적 인구 비중을 짧게. 예: "30대 미혼 여성 · 해당 연령대의 약 31%".
4. 이름은 성씨 분포(김·이·박·정·최 상위 54%) 반영.
5. 다른 텍스트 없이 아래 JSON 배열만 출력 (마크다운 백틱 금지):
[{"n":"이름","s":"남자|여자","a":나이,"r":"시도-시군구","o":"직업","e":"학력","m":"혼인상태","h":"가구형태","p":"한 문장 페르소나 요약","w":"통계 수치 인용한 추천 이유 1-2문장","c":"세그먼트 · 비중"}]`;

      // gemini-flash-latest 모델 고정
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`;
      
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            responseMimeType: "application/json",
          }
        }),
      });

      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.error?.message || "API 요청 실패");
      }

      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const start = clean.indexOf("[");
      const end = clean.lastIndexOf("]");
      const parsed = JSON.parse(clean.slice(start, end + 1));
      
      return parsed.map((x) => ({
        name: x.n,
        sex: x.s,
        age: x.a,
        region: x.r,
        occupation: x.o,
        education: x.e,
        marital: x.m,
        household: x.h,
        persona: x.p,
        reason: x.w,
        coverage: x.c,
      }));
    }

    function PersonaFinder() {
      const [apiKey, setApiKey] = useState("");
      const [topic, setTopic] = useState("");
      const [personas, setPersonas] = useState([]);
      const [loading, setLoading] = useState(false);
      const [stage, setStage] = useState("");
      const [error, setError] = useState("");
      const [doneTopic, setDoneTopic] = useState("");

      const search = async (t) => {
        const q = (t ?? topic).trim();
        if (!q || loading) return;
        
        if (!apiKey.trim()) {
          setError("화면 상단의 API Key 입력 칸에 올바른 Gemini API 키를 입력해 주세요.");
          return;
        }

        setTopic(q);
        setLoading(true);
        setError("");
        setPersonas([]);
        
        try {
          setStage("데이터셋 분포에서 타깃 세그먼트 분석 중…");
          const first = await fetchBatch(q, 0, 5, [], apiKey);
          setPersonas(first);
          setStage("나머지 페르소나 5명 매칭 중…");
          const second = await fetchBatch(q, 5, 5, first, apiKey);
          setPersonas([...first, ...second]);
          setDoneTopic(q);
        } catch (e) {
          console.error(e);
          setError("페르소나를 생성하지 못했습니다. API 키를 확인하시거나 잠시 후 다시 시도해 주세요.");
        } finally {
          setLoading(false);
          setStage("");
        }
      };

      const downloadExcel = () => {
        const rows = personas.map((p, i) => {
          const row = { 번호: i + 1 };
          FIELDS.forEach((f) => (row[f.label] = p[f.k]));
          return row;
        });
        const ws = window.XLSX.utils.json_to_sheet(rows);
        ws["!cols"] = [
          { wch: 5 }, { wch: 10 }, { wch: 6 }, { wch: 5 }, { wch: 16 },
          { wch: 18 }, { wch: 14 }, { wch: 10 }, { wch: 16 }, { wch: 50 },
          { wch: 60 }, { wch: 30 },
        ];
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, "추천 페르소나");
        const meta = window.XLSX.utils.aoa_to_sheet([
          ["주제", doneTopic],
          ["기반 데이터", "NVIDIA Nemotron-Personas-Korea (KOSIS·대법원·건보공단 등 실측 분포 기반, 100만 레코드)"],
          ["생성일", new Date().toLocaleString("ko-KR")],
        ]);
        meta["!cols"] = [{ wch: 12 }, { wch: 80 }];
        window.XLSX.utils.book_append_sheet(wb, meta, "정보");
        window.XLSX.writeFile(wb, `페르소나_추천_${doneTopic.slice(0, 12)}.xlsx`);
      };

      return (
        <div style={{ minHeight: "100vh", fontFamily: "-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Apple SD Gothic Neo', 'Pretendard', 'Malgun Gothic', sans-serif", color: "#1D1D1F", WebkitFontSmoothing: "antialiased" }}>
          <header style={{ position: "sticky", top: 0, zIndex: 20, backdropFilter: "saturate(180%) blur(20px)", WebkitBackdropFilter: "saturate(180%) blur(20px)", background: "rgba(251,251,253,0.8)", borderBottom: "1px solid rgba(0,0,0,0.06)" }}>
            <div style={{ maxWidth: 980, margin: "0 auto", padding: "14px 22px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "10px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                <div style={{ fontSize: 15, fontWeight: 600, letterSpacing: "-0.01em" }}>Persona Finder</div>
                <div style={{ fontSize: 12, color: "#86868B" }}>Nemotron-Personas-Korea 기반</div>
              </div>
              
              {/* API 키 입력 및 발급 링크 영역 */}
              <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                <a href="https://aistudio.google.com/" target="_blank" rel="noopener noreferrer" style={{ fontSize: 13, color: "#0071E3", textDecoration: "none", fontWeight: 500 }}>
                  API 발급받기
                </a>
                <input
                  type="password"
                  value={apiKey}
                  onChange={(e) => setApiKey(e.target.value)}
                  placeholder="Gemini API Key 입력"
                  style={{ height: 32, padding: "0 12px", borderRadius: 8, border: "1px solid #D2D2D7", background: "#FFF", fontSize: 13, outline: "none", color: "#1D1D1F", width: 200, boxSizing: "border-box" }}
                  onFocus={(e) => (e.target.style.borderColor = "#0071E3")}
                  onBlur={(e) => (e.target.style.borderColor = "#D2D2D7")}
                />
              </div>
            </div>
          </header>

          <main style={{ maxWidth: 980, margin: "0 auto", padding: "0 22px 96px" }}>
            <section style={{ textAlign: "center", padding: "72px 0 40px" }}>
              <h1 style={{ fontSize: "clamp(34px, 6vw, 56px)", fontWeight: 700, letterSpacing: "-0.03em", lineHeight: 1.08, margin: 0 }}>
                주제를 말해보세요.
                <br />
                <span style={{ background: "linear-gradient(90deg,#0071E3,#40A9FF)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                  대한민국이 답합니다.
                </span>
              </h1>
              <p style={{ maxWidth: 560, margin: "18px auto 0", fontSize: 17, lineHeight: 1.5, color: "#6E6E73" }}>
                통계청·대법원 등 실측 분포로 합성된 100만 페르소나 데이터셋에서, 입력한 주제에 가장 대표성 있는 한국인 페르소나 10명을 통계적 근거와 함께 추천합니다.
              </p>

              <div style={{ maxWidth: 620, margin: "36px auto 0", display: "flex", gap: 10 }}>
                <input
                  value={topic}
                  onChange={(e) => setTopic(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && search()}
                  placeholder="예: 저가 커피 프랜차이즈 신메뉴"
                  disabled={loading}
                  style={{ flex: 1, height: 52, padding: "0 22px", borderRadius: 980, border: "1px solid #D2D2D7", background: "#FFF", fontSize: 16, outline: "none", color: "#1D1D1F", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", boxSizing: "border-box" }}
                  onFocus={(e) => (e.target.style.borderColor = "#0071E3")}
                  onBlur={(e) => (e.target.style.borderColor = "#D2D2D7")}
                />
                <button
                  onClick={() => search()}
                  disabled={loading || !topic.trim()}
                  style={{ height: 52, padding: "0 28px", borderRadius: 980, border: "none", background: loading || !topic.trim() ? "#B0D4F5" : "#0071E3", color: "#FFF", fontSize: 16, fontWeight: 500, cursor: loading || !topic.trim() ? "default" : "pointer", transition: "background .2s", whiteSpace: "nowrap" }}
                >
                  {loading ? "분석 중…" : "추천받기"}
                </button>
              </div>

              <div style={{ marginTop: 18, display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center" }}>
                {SAMPLE_TOPICS.map((t) => (
                  <button key={t} onClick={() => search(t)} disabled={loading}
                    style={{ padding: "7px 14px", borderRadius: 980, border: "1px solid #D2D2D7", background: "transparent", fontSize: 13, color: "#0071E3", cursor: "pointer" }}>
                    {t}
                  </button>
                ))}
              </div>
            </section>

            {loading && (
              <div style={{ textAlign: "center", padding: "8px 0 32px", color: "#6E6E73", fontSize: 14 }}>
                <div style={{ width: 22, height: 22, margin: "0 auto 12px", border: "2.5px solid #E5E5EA", borderTopColor: "#0071E3", borderRadius: "50%", animation: "pfspin .8s linear infinite" }} />
                {stage}
                <style>{`@keyframes pfspin{to{transform:rotate(360deg)}}`}</style>
              </div>
            )}
            
            {error && (
              <div style={{ maxWidth: 620, margin: "0 auto 32px", padding: "14px 20px", borderRadius: 14, background: "#FFF2F2", color: "#C0392B", fontSize: 14, textAlign: "center" }}>
                {error}
              </div>
            )}

            {personas.length > 0 && (
              <>
                <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", flexWrap: "wrap", gap: 12, margin: "8px 0 20px" }}>
                  <h2 style={{ fontSize: 24, fontWeight: 700, letterSpacing: "-0.02em", margin: 0 }}>
                    추천 페르소나 <span style={{ color: "#86868B", fontWeight: 500 }}>{personas.length}/10</span>
                  </h2>
                  {!loading && personas.length === 10 && (
                    <button onClick={downloadExcel}
                      style={{ height: 40, padding: "0 20px", borderRadius: 980, border: "none", background: "#1D1D1F", color: "#FFF", fontSize: 14, fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                      Excel 다운로드
                    </button>
                  )}
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16 }}>
                  {personas.map((p, i) => (
                    <article key={i} style={{ background: "#FFF", borderRadius: 20, padding: 24, boxShadow: "0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.05)", display: "flex", flexDirection: "column", gap: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ width: 44, height: 44, borderRadius: "50%", background: p.sex === "여자" ? "linear-gradient(135deg,#FF9EB5,#FF6482)" : "linear-gradient(135deg,#6BB6FF,#0071E3)", color: "#FFF", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, fontWeight: 600, flexShrink: 0 }}>
                          {p.name?.[0]}
                        </div>
                        <div style={{ minWidth: 0 }}>
                          <div style={{ fontSize: 17, fontWeight: 600, letterSpacing: "-0.01em" }}>
                            {p.name} <span style={{ fontSize: 13, fontWeight: 400, color: "#86868B" }}>{p.age}세 · {p.sex}</span>
                          </div>
                          <div style={{ fontSize: 13, color: "#6E6E73", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                            {p.occupation} · {p.region}
                          </div>
                        </div>
                      </div>

                      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                        {[p.education, p.marital, p.household].filter(Boolean).map((tag, j) => (
                          <span key={j} style={{ fontSize: 11.5, padding: "4px 10px", borderRadius: 980, background: "#F5F5F7", color: "#515154" }}>{tag}</span>
                        ))}
                      </div>

                      <p style={{ margin: 0, fontSize: 14, lineHeight: 1.55, color: "#1D1D1F" }}>{p.persona}</p>

                      <div style={{ marginTop: "auto", paddingTop: 12, borderTop: "1px solid #F0F0F2" }}>
                        <div style={{ fontSize: 11, fontWeight: 600, color: "#0071E3", letterSpacing: "0.04em", textTransform: "uppercase", marginBottom: 5 }}>왜 이 페르소나인가</div>
                        <p style={{ margin: 0, fontSize: 13, lineHeight: 1.55, color: "#515154" }}>{p.reason}</p>
                        {p.coverage && (
                          <div style={{ marginTop: 10, display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 500, color: "#0071E3", background: "rgba(0,113,227,0.08)", padding: "5px 12px", borderRadius: 980 }}>
                            <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#0071E3" }} />
                            {p.coverage}
                          </div>
                        )}
                      </div>
                    </article>
                  ))}
                </div>
              </>
            )}

            <p style={{ marginTop: 56, textAlign: "center", fontSize: 12, color: "#86868B", lineHeight: 1.6 }}>
              추천은 NVIDIA Nemotron-Personas-Korea(CC BY 4.0)의 공개 분포 통계를 근거로 AI가 생성한 합성 페르소나이며, 실존 인물과 무관합니다.
            </p>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<PersonaFinder />);
  </script>
</body>
</html>
